services:
  app:
    build:
      context: .
    image: timerr-app
    container_name: timerr_app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_KEY: ${APP_KEY:-base64:GdUh0f/cc/ta1rRIdsmWORGjGxuZk+oNWcBV4JEEoT4=}
      APP_URL: ${APP_URL:-http://localhost:8000}
      DB_CONNECTION: sqlite
      DB_DATABASE: /data/database.sqlite
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
    volumes:
      - sqlite_data:/data
      - app_storage:/var/www/html/storage

volumes:
  sqlite_data:
  app_storage:
