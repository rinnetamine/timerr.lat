services:

  app:
    build: .
    container_name: laravel_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
    volumes:
      - .:/var/www/html
      - ./database:/var/www/html/database
    networks:
      - laravel_network